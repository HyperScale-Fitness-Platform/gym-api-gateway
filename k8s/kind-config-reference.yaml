# This file is a REFERENCE ONLY — the actual file your team uses lives in
# the gym-platform-infra repo as kind-config.yaml, and is used like:
#   kind create cluster --name gym-dev --config kind-config.yaml
#
# By default, kind does NOT expose anything running inside the cluster to
# your laptop. The "extraPortMappings" block below is what makes the
# gateway's NodePort (30080, set in k8s/deployment.yaml) reachable at
# http://localhost:8080 on your actual machine.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # must match "nodePort" in api-gateway's Service
        hostPort: 8080          # the port YOU will use: http://localhost:8080
        protocol: TCP
